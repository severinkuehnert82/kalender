<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Busfahrer - Spiel</title>
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="css/busfahrer.css">
</head>
<body>
    <!-- Header Container -->
    <div id="header"></div>

    <main class="game-container">
        <!-- Runden-Info & Anweisung -->
        <div class="game-header">
            <h1 id="roundTitle">Busfahrer Vorbereitung</h1>
            <p id="gameInstruction">Wähle Mitspieler aus und lege die Anzahl der Decks fest.</p>
        </div>

        <!-- Kartenbereich -->
        <div class="card-area">
            <div class="card-wrapper" id="cardWrapper">
                <!-- Wird per JS befüllt -->
            </div>
        </div>

        <!-- Touch-freundlicher Steuerungsbereich -->
        <div class="controls-area" id="controlsArea">
            <!-- Wird per JS geladen -->
        </div>
    </main>

    <script type="module" src="js/busfahrer.js"></script>
</body>
</html>

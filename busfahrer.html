<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="apple-mobile-web-app-title" content="Omnia">
    <meta name="theme-color" content="#0f172a">

    <title>Busfahrer – Omnia</title>
    <link rel="manifest" href="manifest.json">
    <link rel="apple-touch-icon" href="apple-touch-icon.png">
    <link rel="icon" href="favicon-32.png">

    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="css/busfahrer.css">
</head>
<body>
    <div id="header"></div>

    <main class="game-container">
        <!-- Runden-Info & Anweisung -->
        <div class="game-header">
            <h1 id="roundTitle">Busfahrer</h1>
            <p id="gameInstruction">Lade Spieler…</p>
        </div>

        <!-- Kartenbereich -->
        <div class="card-area">
            <div class="card-wrapper" id="cardWrapper">
                <!-- Wird per JS befüllt -->
            </div>
        </div>

        <!-- Touch-freundlicher Steuerungsbereich -->
        <div class="controls-area" id="controlsArea">
            <!-- Wird per JS geladen -->
        </div>
    </main>

    <script type="module" src="js/busfahrer.js"></script>
    <script type="module" src="js/sw-register.js"></script>
</body>
</html>

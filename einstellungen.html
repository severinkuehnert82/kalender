<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="apple-mobile-web-app-title" content="Omnia">
    <meta name="theme-color" content="#0f172a">

    <title>Einstellungen – Omnia</title>
    <link rel="manifest" href="manifest.json">
    <link rel="apple-touch-icon" href="apple-touch-icon.png">
    <link rel="icon" href="favicon-32.png">

    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="css/mitspieler.css">

    <script type="module" src="js/einstellungen.js"></script>
    <script type="module" src="js/sw-register.js"></script>
</head>
<body>
    <div id="header"></div>

    <main class="mitspieler-container">
        <section class="card">
            <h2>Einstellungen</h2>
            <p class="subtitle">App-Informationen und Datenverwaltung.</p>

            <div class="settings-row">
                <span>App</span>
                <span>Omnia</span>
            </div>
            <div class="settings-row">
                <span>Gespeicherte Spieler</span>
                <span id="spielerAnzahl">…</span>
            </div>
        </section>

        <section class="card settings-danger">
            <h2>Daten zurücksetzen</h2>
            <p class="subtitle">Löscht alle gespeicherten Spieler unwiderruflich. Ein laufendes Spiel ist davon nicht betroffen.</p>
            <button id="btnReset" class="btn btn-delete-all">Alle Spieler löschen</button>
            <p id="resetStatus" class="reset-status" hidden></p>
        </section>
    </main>
</body>
</html>

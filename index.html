<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Meine Webseite | Startseite</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            margin: 0;
            padding: 0;
            background-color: #f4f4f4;
            color: #333;
            text-align: center;
        }
        header {
            background-color: #005f73;
            color: white;
            padding: 2rem 0;
        }
        main {
            padding: 2rem;
            background-color: white;
            max-width: 800px;
            margin: 2rem auto;
            border-radius: 8px;
            box-shadow: 0 4px 6px rgba(0, 0, 0, 0.1);
        }
        footer {
            background-color: #333;
            color: white;
            padding: 1rem 0;
            position: fixed;
            bottom: 0;
            width: 100%;
        }
    </style>

    <link rel="apple-touch-icon" href="appicon.png">
</head>
<body>

    <header>
        <h1>Willkommen auf meiner Webseite</h1>
    </header>

    <main>
        <h2>Hier entsteht meine neue Internetseite</h2>
        <p>Dies ist eine einfache HTML-Seite, die als Startseite (index.html) dient. Sie können den Text ganz nach Ihren Wünschen anpassen.</p>
    </main>

    <footer>
        <p>&copy; 2026 Mein Name</p>
    </footer>

</body>
</html>
